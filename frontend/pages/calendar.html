<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/calendar.js" defer></script>
</head>
<body class="db-body">

<div class="app-shell" id="appShell">

  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <a href="../index.html" class="sb-logo">
        <span class="sb-logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="8" height="8" rx="2" fill="#fff"/>
            <rect x="13" y="3" width="8" height="8" rx="2" fill="#fff" opacity="0.4"/>
            <rect x="3" y="13" width="8" height="8" rx="2" fill="#fff" opacity="0.4"/>
            <rect x="13" y="13" width="8" height="8" rx="2" fill="#fff"/>
          </svg>
        </span>
        <span class="sb-logo-text">TaskFlow</span>
      </a>
      <button class="sb-collapse-btn" id="sidebarToggle" aria-label="Collapse sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="sb-workspace">
      <button class="sb-workspace-btn" id="workspaceBtn">
        <span class="ws-avatar">A</span>
        <span class="ws-info">
          <span class="ws-name">Acme Corp</span>
          <span class="ws-plan">Pro plan</span>
        </span>
        <svg class="ws-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3.5 5.25L7 8.75l3.5-3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <nav class="sb-nav">
      <div class="sb-section-label">Main</div>
      <a href="dashboard.html" class="sb-item" data-tooltip="Dashboard">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.45"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.45"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
          </svg>
        </span>
        <span class="sb-label">Dashboard</span>
      </a>
      <a href="projects.html" class="sb-item" data-tooltip="Projects">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 3.5h12M2 8h8M2 12.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Projects</span>
        <span class="sb-badge">4</span>
      </a>
      <a href="tasks.html" class="sb-item" data-tooltip="My Tasks">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 8l2.5 2.5 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="sb-label">My Tasks</span>
        <span class="sb-badge">12</span>
      </a>
      <a href="kanban-board.html" class="sb-item" data-tooltip="Kanban">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="2" width="4" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="6" y="2" width="4" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="11" y="2" width="4" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </span>
        <span class="sb-label">Kanban</span>
      </a>
      <a href="calendar.html" class="sb-item active" data-tooltip="Calendar">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 2v2M11 2v2M2 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Calendar</span>
      </a>

      <div class="sb-divider"></div>
      <div class="sb-section-label">Workspace</div>
      <a href="teams.html" class="sb-item" data-tooltip="Teams">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M1.5 13.5c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="12" cy="5" r="1.75" stroke="currentColor" stroke-width="1.3"/>
            <path d="M14.5 13.5c0-1.657-.895-3.1-2.25-3.75" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Teams</span>
      </a>
    </nav>
  </aside>

  <div class="main-area" id="mainArea">
    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="mobileMenuBtn" aria-label="Open sidebar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="topbar-breadcrumb">
          <span class="breadcrumb-workspace">Acme Corp</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="#9CA3AF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="breadcrumb-page">Calendar</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" id="createEventBtnTop">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="margin-right:6px; display:inline-block; vertical-align:middle;">
            <path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
          </svg>
          <span style="vertical-align:middle;">New Event</span>
        </button>
      </div>
    </header>

    <main class="page-content" id="pageContent">
      <div class="calendar-layout">
        
        <aside class="calendar-sidebar-panel">
          <button class="btn btn-primary create-sidebar-btn" id="createEventBtnSidebar">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Create Event</span>
          </button>

          <div class="sidebar-section">
            <h3 class="sidebar-section-title">Calendars</h3>
            <div class="filter-list">
              <label class="filter-item">
                <input type="checkbox" id="filterDeadline" checked />
                <span class="filter-color-dot dot-deadline"></span>
                <span>Task Deadlines</span>
              </label>
              <label class="filter-item">
                <input type="checkbox" id="filterMeeting" checked />
                <span class="filter-color-dot dot-meeting"></span>
                <span>Meetings</span>
              </label>
              <label class="filter-item">
                <input type="checkbox" id="filterMilestone" checked />
                <span class="filter-color-dot dot-milestone"></span>
                <span>Project Milestones</span>
              </label>
            </div>
          </div>

          <div class="sidebar-section">
            <h3 class="sidebar-section-title">Upcoming Events</h3>
            <div class="upcoming-events-list" id="upcomingEventsList">
              </div>
          </div>
        </aside>

        <div class="calendar-workspace">
          <div class="calendar-toolbar">
            <div class="toolbar-nav-group">
              <button class="btn btn-outline btn-sm" id="btnToday">Today</button>
              <div class="nav-arrows">
                <button class="nav-arrow-btn" id="btnPrev" aria-label="Previous">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M10 13L5 8l5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button class="nav-arrow-btn" id="btnNext" aria-label="Next">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
              <h2 class="calendar-current-label" id="calendarLabel">—</h2>
            </div>

            <div class="toolbar-view-group">
              <button class="view-toggle-btn active" data-view="month" id="toggleMonth">Month</button>
              <button class="view-toggle-btn" data-view="week" id="toggleWeek">Week</button>
              <button class="view-toggle-btn" data-view="day" id="toggleDay">Day</button>
            </div>
          </div>

          <div class="calendar-view-body" id="calendarViewBody">
            </div>
        </div>

      </div>
    </main>
  </div>
</div>

<div class="modal-backdrop" id="createModalBackdrop" style="display:none;"></div>
<div class="calendar-modal" id="createEventModal" style="display:none;">
  <div class="modal-header">
    <h3 class="modal-title">Create New Event</h3>
    <button class="modal-close-btn" id="closeCreateModal" aria-label="Close modal">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <form id="createEventForm" class="modal-form">
    <div class="form-group">
      <label for="eventTitle" class="form-label">Event Title</label>
      <input type="text" id="eventTitle" class="form-input" placeholder="e.g., Q4 Roadmap Review" required />
    </div>
    <div class="form-row">
      <div class="form-group col-6">
        <label for="eventType" class="form-label">Event Type</label>
        <select id="eventType" class="form-select">
          <option value="deadline">Task Deadline</option>
          <option value="meeting">Meeting</option>
          <option value="milestone">Project Milestone</option>
        </select>
      </div>
      <div class="form-group col-6">
        <label for="eventProject" class="form-label">Project</label>
        <select id="eventProject" class="form-select">
          <option value="Platform v3">Platform v3</option>
          <option value="Mobile App">Mobile App</option>
          <option value="API Gateway">API Gateway</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group col-6">
        <label for="eventDate" class="form-label">Date</label>
        <input type="date" id="eventDate" class="form-input" required />
      </div>
      <div class="form-group col-6">
        <label for="eventTime" class="form-label">Start Time</label>
        <input type="time" id="eventTime" class="form-input" value="10:00" />
      </div>
    </div>
    <div class="form-group">
      <label for="eventDescription" class="form-label">Description</label>
      <textarea id="eventDescription" class="form-textarea" rows="3" placeholder="Add conference link, goals, or specifications..."></textarea>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline btn-sm" id="btnCancelCreate">Cancel</button>
      <button type="submit" class="btn btn-primary btn-sm">Save Event</button>
    </div>
  </form>
</div>

<div class="modal-backdrop" id="detailModalBackdrop" style="display:none;"></div>
<div class="calendar-modal detail-modal" id="eventDetailModal" style="display:none;">
  <div class="modal-header" style="border:none; padding-bottom:0;">
    <div class="detail-type-badge" id="detailTypeBadge">—</div>
    <button class="modal-close-btn" id="closeDetailModal" aria-label="Close details">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="detail-body">
    <h3 class="detail-title" id="detailTitle">—</h3>
    <div class="detail-meta-row">
      <svg class="detail-meta-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/>
        <path d="M5 2v2M11 2v2M2 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <div class="detail-meta-text" id="detailDateTime">—</div>
    </div>
    <div class="detail-meta-row">
      <svg class="detail-meta-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/>
        <path d="M8 5v3l2.5 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <div class="detail-meta-text" id="detailProject">—</div>
    </div>
    <div class="detail-description-block" id="detailDescription">—</div>
  </div>
  <div class="modal-footer detail-footer">
    <button class="btn btn-danger btn-sm" id="btnDeleteEvent">Delete Event</button>
    <button class="btn btn-outline btn-sm" id="btnCloseDetail">Close</button>
  </div>
</div>

</body>
</html>
