<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Chat Hub — TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/chat.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body class="db-body">

<div class="app-shell" id="appShell">

  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <a href="../index.html" class="sb-logo">
        <span class="sb-logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3"  y="3"  width="8" height="8" rx="2" fill="#fff"/>
            <rect x="13" y="3"  width="8" height="8" rx="2" fill="#fff" opacity="0.4"/>
            <rect x="3"  y="13" width="8" height="8" rx="2" fill="#fff" opacity="0.4"/>
            <rect x="13" y="13" width="8" height="8" rx="2" fill="#fff"/>
          </svg>
        </span>
        <span class="sb-logo-text">TaskFlow</span>
      </a>
      <button class="sb-collapse-btn" id="sidebarToggle" aria-label="Collapse sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="sb-workspace">
      <button class="sb-workspace-btn" id="workspaceBtn">
        <span class="ws-avatar">A</span>
        <span class="ws-info">
          <span class="ws-name">Acme Corp</span>
          <span class="ws-plan">Pro plan</span>
        </span>
        <svg class="ws-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3.5 5.25L7 8.75l3.5-3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <nav class="sb-nav">
      <div class="sb-section-label">Main</div>
      <a href="dashboard.html" class="sb-item" data-tooltip="Dashboard">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.45"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.45"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
          </svg>
        </span>
        <span class="sb-label">Dashboard</span>
      </a>
      <a href="projects.html" class="sb-item" data-tooltip="Projects">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 3.5h12M2 8h8M2 12.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Projects</span>
      </a>
      <a href="tasks.html" class="sb-item" data-tooltip="My Tasks">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 8l2.5 2.5 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="sb-label">My Tasks</span>
      </a>
      <a href="kanban-board.html" class="sb-item" data-tooltip="Kanban">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1"  y="2" width="4" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="6"  y="2" width="4" height="7"  rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="11" y="2" width="4" height="9"  rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </span>
        <span class="sb-label">Kanban</span>
      </a>
      <a href="calendar.html" class="sb-item" data-tooltip="Calendar">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 2v2M11 2v2M2 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Calendar</span>
      </a>

      <div class="sb-divider"></div>
      <div class="sb-section-label">Workspace</div>

      <a href="teams.html" class="sb-item" data-tooltip="Teams">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M1.5 13.5c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Teams</span>
      </a>
      <a href="analytics.html" class="sb-item" data-tooltip="Analytics">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="7"  width="3" height="7" rx="1" fill="currentColor" opacity="0.4"/>
            <rect x="6.5" y="3"  width="3" height="11" rx="1" fill="currentColor" opacity="0.7"/>
            <rect x="11.5" y="5" width="3" height="9" rx="1" fill="currentColor"/>
          </svg>
        </span>
        <span class="sb-label">Analytics</span>
      </a>
      <a href="chat.html" class="sb-item active" data-tooltip="Chat">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M14 8c0 3.314-2.686 6-6 6a6.07 6.07 0 01-2.8-.681L2 14l.681-3.2A6.07 6.07 0 012 8c0-3.314 2.686-6 6-6s6 2.686 6 6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="sb-label">Chat</span>
      </a>
    </nav>
  </aside>

  <div class="main-area" id="mainArea">
    
    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="mobileMenuBtn" aria-label="Open sidebar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="topbar-breadcrumb">
          <span class="breadcrumb-workspace">Acme Corp</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="#9CA3AF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="breadcrumb-page">Chat Messaging</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="topbar-avatar-btn">
          <div class="topbar-avatar" style="background: var(--primary);">AD</div>
        </div>
      </div>
    </header>

    <main class="page-content chat-page-override">
      <div class="chat-layout-wrapper">
        
        <aside class="chat-sidebar-pane">
          <div class="chat-search-container">
            <div class="chat-search-input-wrapper">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="sidebarSearchField" placeholder="Filter sections..." autocomplete="off" />
            </div>
          </div>

          <div class="chat-sidebar-lists-scroll">
            <div class="chat-group-section" data-section-type="channels">
              <div class="chat-group-header">
                <span>Channels</span>
                <button class="chat-add-section-item" id="btnCreateChannel" title="Add Channel">+</button>
              </div>
              <div class="chat-group-items" id="channelsListContainer">
                </div>
            </div>

            <div class="chat-group-section" data-section-type="dms">
              <div class="chat-group-header">
                <span>Direct Messages</span>
              </div>
              <div class="chat-group-items" id="dmsListContainer">
                </div>
            </div>

            <div class="chat-group-section" data-section-type="teams">
              <div class="chat-group-header">
                <span>Team Groups</span>
              </div>
              <div class="chat-group-items" id="teamsListContainer">
                </div>
            </div>
          </div>
        </aside>

        <section class="chat-main-viewport">
          <div class="chat-viewport-header">
            <div class="chat-active-info">
              <div class="chat-active-title-row">
                <h2 id="activeChatTitle"># general</h2>
                <span class="chat-active-badge-count" id="activeMemberBadge">18 members</span>
              </div>
              <p class="chat-active-purpose" id="activeChatPurpose">Company-wide workspace announcements, alerts, and shared notes.</p>
            </div>
            
            <div class="chat-history-search-box">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="chatHistorySearchInput" placeholder="Filter message content..." />
            </div>
          </div>

          <div class="chat-messages-container" id="chatMessagesContainer">
            </div>

          <div class="chat-typing-indicator-bar" id="chatTypingIndicator" style="display: none;">
            <div class="typing-bouncing-indicator">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
            <span id="chatTypingText">Colleague is typing...</span>
          </div>

          <div class="chat-input-sticky-area">
            <form id="chatFormAction">
              <div class="chat-input-box-frame">
                <div class="chat-input-toolbar-left">
                  <button type="button" class="chat-tool-btn" id="chatAttachButton" title="Simulate File Attachment">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                  </button>
                  <button type="button" class="chat-tool-btn" id="chatEmojiButton" title="Insert Expression Emoji">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="15" x2="15.01" y2="15"></line></svg>
                  </button>
                </div>

                <input type="text" id="chatMainInputField" placeholder="Type a message..." autocomplete="off" required />

                <div class="chat-input-toolbar-right">
                  <button type="submit" class="btn btn-primary chat-send-action-btn">
                    <span>Send</span>
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </section>

      </div>
    </main>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="toast-container" id="chatToastHolder"></div>

<script src="../js/chat.js"></script>
</body>
</html>
