<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&family=Poppins:wght=600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/landing.css" />
</head>
<body class="db-body">

<div class="app-shell" id="appShell">

  <aside class="sidebar" id="sidebar">

    <div class="sb-header">
      <a href="../index.html" class="sb-logo">
        <span class="sb-logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3"  y="3"  width="8" height="8" rx="2" fill="#fff"/>
            <rect x="13" y="3"  width="8" height="8" rx="2" fill="#fff" opacity="0.4"/>
            <rect x="3"  y="13" width="8" height="8" rx="2" fill="#fff" opacity="0.4"/>
            <rect x="13" y="13" width="8" height="8" rx="2" fill="#fff"/>
          </svg>
        </span>
        <span class="sb-logo-text">TaskFlow</span>
      </a>
      <button class="sb-collapse-btn" id="sidebarToggle" aria-label="Collapse sidebar" title="Collapse sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="sb-workspace">
      <button class="sb-workspace-btn" id="workspaceBtn">
        <span class="ws-avatar">A</span>
        <span class="ws-info">
          <span class="ws-name">Acme Corp</span>
          <span class="ws-plan">Pro plan</span>
        </span>
        <svg class="ws-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3.5 5.25L7 8.75l3.5-3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <nav class="sb-nav">
      <div class="sb-section-label">Main</div>
      <a href="dashboard.html" class="sb-item" data-tooltip="Dashboard">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.45"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.45"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
          </svg>
        </span>
        <span class="sb-label">Dashboard</span>
      </a>
      <a href="projects.html" class="sb-item" data-tooltip="Projects">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 3.5h12M2 8h8M2 12.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Projects</span>
        <span class="sb-badge">4</span>
      </a>
      <a href="tasks.html" class="sb-item" data-tooltip="My Tasks">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 8l2.5 2.5 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="sb-label">My Tasks</span>
        <span class="sb-badge">12</span>
      </a>
      <a href="kanban-board.html" class="sb-item" data-tooltip="Kanban">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1"  y="2" width="4" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="6"  y="2" width="4" height="7"  rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="11" y="2" width="4" height="9"  rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </span>
        <span class="sb-label">Kanban</span>
      </a>
      <a href="calendar.html" class="sb-item" data-tooltip="Calendar">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 2v2M11 2v2M2 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Calendar</span>
      </a>

      <div class="sb-divider"></div>
      <div class="sb-section-label">Workspace</div>

      <a href="teams.html" class="sb-item" data-tooltip="Teams">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M1.5 13.5c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="12" cy="5" r="1.75" stroke="currentColor" stroke-width="1.3"/>
            <path d="M14.5 13.5c0-1.657-.895-3.1-2.25-3.75" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Teams</span>
      </a>
      <a href="analytics.html" class="sb-item" data-tooltip="Analytics">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="7"  width="3" height="7" rx="1" fill="currentColor" opacity="0.4"/>
            <rect x="6.5" y="3"  width="3" height="11" rx="1" fill="currentColor" opacity="0.7"/>
            <rect x="11.5" y="5" width="3" height="9" rx="1" fill="currentColor"/>
          </svg>
        </span>
        <span class="sb-label">Analytics</span>
      </a>
      <a href="chat.html" class="sb-item" data-tooltip="Chat">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M14 8c0 3.314-2.686 6-6 6a6.07 6.07 0 01-2.8-.681L2 14l.681-3.2A6.07 6.07 0 012 8c0-3.314 2.686-6 6-6s6 2.686 6 6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="sb-label">Chat</span>
        <span class="sb-badge sb-badge-dot"></span>
      </a>

      <div class="sb-divider"></div>
      <div class="sb-section-label">Projects</div>

      <a href="#" class="sb-item sb-project-item" data-tooltip="Platform v3">
        <span class="sb-project-dot" style="background:#2563EB"></span>
        <span class="sb-label">Platform v3</span>
      </a>
      <a href="#" class="sb-item sb-project-item" data-tooltip="Mobile App">
        <span class="sb-project-dot" style="background:#7C3AED"></span>
        <span class="sb-label">Mobile App</span>
      </a>
      <a href="#" class="sb-item sb-project-item" data-tooltip="API Gateway">
        <span class="sb-project-dot" style="background:#0891B2"></span>
        <span class="sb-label">API Gateway</span>
      </a>
    </nav>

    <div class="sb-footer">
      <a href="settings.html" class="sb-item" data-tooltip="Settings">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.25" stroke="currentColor" stroke-width="1.4"/>
            <path d="M8 1v1.5M8 13.5V15M15 8h-1.5M2.5 8H1M12.364 3.636l-1.06 1.06M4.697 11.303l-1.06 1.06M12.364 12.364l-1.06-1.06M4.697 4.697l-1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Settings</span>
      </a>
    </div>
  </aside>

  <div class="main-area" id="mainArea">

    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="mobileMenuBtn" aria-label="Open sidebar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="topbar-breadcrumb">
          <span class="breadcrumb-workspace">Acme Corp</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="#9CA3AF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="breadcrumb-page">Notifications</span>
        </div>
      </div>

      <div class="topbar-center">
        <div class="topbar-search" id="topbarSearch">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke="#9CA3AF" stroke-width="1.4"/>
            <path d="M10.5 10.5L13 13" stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="search" class="search-input" id="searchInput" placeholder="Search notifications…" autocomplete="off" />
        </div>
      </div>

      <div class="topbar-right">
        <div class="topbar-icon-btn-wrap" id="notifWrap">
          <a href="notifications.html" class="topbar-icon-btn active" id="notifBtn" aria-label="Notifications">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
              <path d="M8.5 2.5a4.5 4.5 0 00-4.5 4.5v3.5l-1.5 2h12l-1.5-2V7a4.5 4.5 0 00-4.5-4.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.5 13.5a2 2 0 004 0" stroke="currentColor" stroke-width="1.4"/>
            </svg>
            <span class="sb-badge" id="topbarNotifBadge" style="display: none;">0</span>
          </a>
        </div>
        <div class="profile-avatar-sm">AD</div>
      </div>
    </header>

    <main class="page-content" id="pageContent">
      
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">Notification Center</h1>
          <p class="page-subtitle">Manage your project activity, mentions, and updates.</p>
        </div>
        <div class="page-header-right">
          <button class="btn btn-outline btn-sm" id="markAllReadBtn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="margin-right: var(--sp-1);">
              <path d="M2 8l4 4 8-8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Mark all as read
          </button>
          <button class="btn btn-outline btn-sm btn-danger-text" id="clearAllBtn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="margin-right: var(--sp-1);">
              <path d="M2.5 4h11M4.5 4v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4M6 6.5v4M10 6.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Clear all
          </button>
        </div>
      </div>

      <div class="notif-max-container">
        
        <div class="notif-toolbar">
          <div class="notif-filter-group">
            <button class="notif-filter-btn active" data-filter="all" id="filterAll">
              All Notifications <span class="notif-filter-count" id="countAll">0</span>
            </button>
            <button class="notif-filter-btn" data-filter="unread" id="filterUnread">
              Unread <span class="notif-filter-count" id="countUnread">0</span>
            </button>
            <button class="notif-filter-btn" data-filter="read" id="filterRead">
              Read <span class="notif-filter-count" id="countRead">0</span>
            </button>
          </div>
        </div>

        <div class="notif-timeline" id="notifTimelineContainer">
          </div>

      </div>
    </main>
  </div>
</div>

<script src="../js/notifications.js"></script>
</body>
</html>
