<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board — TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/tasks.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="#" class="sidebar-logo">
        <div class="logo-mark">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        </div>
        <span class="logo-text">TaskFlow</span>
      </a>
      <button class="sidebar-collapse" aria-label="Collapse Sidebar">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7M20 19l-7-7 7-7"/></svg>
      </button>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-section-label">Management</span>
      <nav class="sidebar-nav">
        <a href="tasks.html" class="nav-item">
          <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/></svg>
          <span>List View</span>
        </a>
        <a href="kanban-board.html" class="nav-item active">
          <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
          <span>Kanban Board</span>
        </a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar-sm">JD</div>
        <div class="user-info">
          <div class="user-name">John Doe</div>
          <div class="user-role">Workspace Owner</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="app-layout">
    
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" aria-label="Open Menu">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="breadcrumb">
          <span class="breadcrumb-link">Tasks</span>
          <span class="breadcrumb-current"> / Kanban</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn" aria-label="Notifications">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span class="topbar-badge">3</span>
        </button>
      </div>
    </header>

    <main class="page-content">
      
      <header class="page-header">
        <div>
          <h1 class="page-title">Project Board</h1>
          <p class="page-subtitle">Manage, visualize, and track team assignments fluidly.</p>
        </div>
        <div class="page-header-right">
          <button class="btn btn-primary btn-sm" id="btn-add-task">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Add Task
          </button>
        </div>
      </header>

      <div class="kanban-container">
        
        <div class="kanban-column" data-status="todo">
          <div class="kb-col-header">
            <div class="kb-col-title-group">
              <span class="status-dot todo"></span>
              <h2 class="kb-col-title">To Do</h2>
              <span class="kb-col-count" id="count-todo">0</span>
            </div>
          </div>
          <div class="kb-cards-dropzone" id="zone-todo"></div>
        </div>

        <div class="kanban-column" data-status="inprogress">
          <div class="kb-col-header">
            <div class="kb-col-title-group">
              <span class="status-dot inprogress"></span>
              <h2 class="kb-col-title">In Progress</h2>
              <span class="kb-col-count" id="count-inprogress">0</span>
            </div>
          </div>
          <div class="kb-cards-dropzone" id="zone-inprogress"></div>
        </div>

        <div class="kanban-column" data-status="review">
          <div class="kb-col-header">
            <div class="kb-col-title-group">
              <span class="status-dot review"></span>
              <h2 class="kb-col-title">Review</h2>
              <span class="kb-col-count" id="count-review">0</span>
            </div>
          </div>
          <div class="kb-cards-dropzone" id="zone-review"></div>
        </div>

        <div class="kanban-column" data-status="completed">
          <div class="kb-col-header">
            <div class="kb-col-title-group">
              <span class="status-dot completed"></span>
              <h2 class="kb-col-title">Completed</h2>
              <span class="kb-col-count" id="count-completed">0</span>
            </div>
          </div>
          <div class="kb-cards-dropzone" id="zone-completed"></div>
        </div>

      </div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="task-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title-text">Create New Task</h3>
        <button class="modal-close" id="modal-close-btn" aria-label="Close modal">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id-field">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="task-title">Title <span class="required">*</span></label>
            <input type="text" id="task-title" class="form-input" placeholder="e.g., Design user onboarding flow" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="task-assignee">Assignee</label>
              <select id="task-assignee" class="form-select">
                <option value="Unassigned">Unassigned</option>
                <option value="Sarah Connor">Sarah Connor</option>
                <option value="Miles Dyson">Miles Dyson</option>
                <option value="John Connor">John Connor</option>
              </select>
            </div>
            <div class="form-row">
              <div class="form-group" style="grid-column: span 2;">
                <label class="form-label" for="task-priority">Priority</label>
                <select id="task-priority" class="form-select">
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                  <option value="critical">Critical</option>
                </select>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="task-due">Due Date</label>
              <input type="date" id="task-due" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label" for="task-status">Status Column</label>
              <select id="task-status" class="form-select">
                <option value="todo">To Do</option>
                <option value="inprogress">In Progress</option>
                <option value="review">Review</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost btn-sm" id="modal-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/kanban.js"></script>
</body>
</html>
